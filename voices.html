<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>音色测试 - 数士</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,"Microsoft YaHei","Noto Sans SC",sans-serif;background:#0a0a12;color:#e0d5c1;line-height:2;font-size:17px;padding:40px 20px}
.container{max-width:600px;margin:0 auto}
h1{text-align:center;color:#f6d365;margin-bottom:30px}
.voice-item{padding:12px 16px;margin:6px 0;border:1px solid rgba(200,170,100,0.2);border-radius:6px;cursor:pointer}
.voice-item:hover{background:rgba(200,170,100,0.1)}
.voice-item.selected{background:rgba(212,168,67,0.2);border-color:#d4a843}
.voice-name{font-size:16px;color:#f6d365}
.voice-lang{font-size:13px;color:#a09080;margin-left:8px}
.voice-info{font-size:12px;color:#706050;margin-left:8px}
#test-text{width:100%;padding:10px;border:1px solid rgba(200,170,100,0.3);background:#1a1a28;color:#e0d5c1;border-radius:4px;margin:15px 0;font-size:15px;font-family:inherit}
#play-btn{background:#d4a843;color:#0a0a12;border:none;padding:10px 24px;font-size:15px;border-radius:4px;cursor:pointer;margin-bottom:20px}
#play-btn:hover{background:#e4b853}
#status{color:#a09080;margin:10px 0}
#loading{text-align:center;padding:40px;color:#706050}
</style>
</head>
<body>
<div class="container">
<h1>🎤 音色测试</h1>
<p style="margin-bottom:20px;color:#a09080">选择下方一个音色，点击"试听"可听到朗读效果。</p>
<textarea id="test-text" rows="3">你好，欢迎来到数士的世界。我是小天，一条被狗神附体的小狗。</textarea>
<button id="play-btn" onclick="testVoice()">▶ 试听</button>
<div id="status"></div>
<div id="loading">正在加载语音列表……</div>
<div id="voice-list"></div>
</div>
<script>
var synth = window.speechSynthesis;
var selectedVoice = null;

function loadVoices() {
    var voices = synth.getVoices();
    var container = document.getElementById("voice-list");
    var loading = document.getElementById("loading");
    if (voices.length === 0) {
        loading.textContent = "暂未检测到语音，请刷新页面或更换浏览器";
        return;
    }
    loading.style.display = "none";

    var zhVoices = voices.filter(function(v) {
        var l = v.lang || "";
        return l.startsWith("zh") || l.startsWith("cmn");
    });
    
    // Show all voices with Chinese ones first
    var sorted = zhVoices.concat(voices.filter(function(v) {
        var l = v.lang || "";
        return !(l.startsWith("zh") || l.startsWith("cmn"));
    }));
    
    var html = "";
    for (var i = 0; i < sorted.length; i++) {
        var v = sorted[i];
        var isZh = (v.lang || "").startsWith("zh");
        var cls = isZh ? "" : " style=\"opacity:0.4\"";
        html += '<div class="voice-item" data-idx="' + i + '" onclick="selectVoice(this,' + i + ')"' + cls + '>';
        html += '<span class="voice-name">' + v.name + '</span>';
        html += '<span class="voice-lang">' + v.lang + '</span>';
        html += '<span class="voice-info">' + (v.localService ? '本地' : '网络') + ' | ' + (isZh ? '中文' : '非中文') + '</span>';
        html += '</div>';
    }
    container.innerHTML = html;
    
    // Auto-select first Chinese female voice
    for (var i = 0; i < sorted.length; i++) {
        var n = sorted[i].name;
        if ((n.indexOf("ting") >= 0 || n.indexOf("Ting") >= 0 || n.indexOf("女") >= 0 || n.indexOf("Xiaoxiao") >= 0 || n.indexOf("Xiaohan") >= 0) && (sorted[i].lang || "").startsWith("zh")) {
            var el = container.querySelectorAll(".voice-item")[i];
            if (el) { selectVoice(el, i); break; }
        }
    }
    // Fallback: first Chinese voice
    if (!selectedVoice && zhVoices.length > 0) {
        for (var i = 0; i < sorted.length; i++) {
            if ((sorted[i].lang || "").startsWith("zh")) {
                var el = container.querySelectorAll(".voice-item")[i];
                if (el) { selectVoice(el, i); break; }
            }
        }
    }
}

function selectVoice(el, idx) {
    document.querySelectorAll(".voice-item").forEach(function(e) { e.classList.remove("selected"); });
    el.classList.add("selected");
    var voices = synth.getVoices();
    selectedVoice = voices[Object.keys(synth.getVoices).length > 0 ? idx : idx];
    // Voices list might be fresh, use a different approach
    var allVoices = synth.getVoices();
    var items = document.querySelectorAll(".voice-item");
    var realIdx = 0;
    for (var i = 0; i < items.length; i++) {
        if (items[i] === el) { realIdx = i; break; }
    }
    selectedVoice = allVoices[realIdx];
    document.getElementById("status").textContent = "已选: " + selectedVoice.name;
}

function testVoice() {
    var text = document.getElementById("test-text").value;
    if (!text) { document.getElementById("status").textContent = "请输入文字"; return; }
    synth.cancel();
    var utter = new SpeechSynthesisUtterance(text);
    utter.lang = "zh-CN";
    utter.rate = 1.0;
    if (selectedVoice) utter.voice = selectedVoice;
    utter.onstart = function() { document.getElementById("status").textContent = "播放中…"; };
    utter.onend = function() { document.getElementById("status").textContent = "播放完成"; };
    utter.onerror = function() { document.getElementById("status").textContent = "播放失败"; };
    synth.speak(utter);
}

// Load voices - Chrome needs async
loadVoices();
if (synth.onvoiceschanged !== undefined) {
    synth.onvoiceschanged = loadVoices;
}
</script>
</body>
</html>
