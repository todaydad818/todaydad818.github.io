<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>音色测试 - 数士</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,"Microsoft YaHei","Noto Sans SC",sans-serif;background:#0a0a12;color:#e0d5c1;line-height:2;font-size:17px;padding:40px 20px}
.container{max-width:600px;margin:0 auto}
h1{text-align:center;color:#f6d365;margin-bottom:10px}
.sub{text-align:center;color:#706050;margin-bottom:25px;font-size:14px}
.voice-item{padding:12px 16px;margin:6px 0;border:1px solid rgba(200,170,100,0.2);border-radius:6px;cursor:pointer;transition:.2s}
.voice-item:hover{background:rgba(200,170,100,0.1)}
.voice-item.selected{background:rgba(212,168,67,0.2);border-color:#d4a843}
.voice-name{font-size:16px;color:#f6d365}
.voice-lang{font-size:13px;color:#a09080;margin-left:8px}
.voice-info{font-size:12px;color:#555}
#status{text-align:center;padding:10px;color:#d4a843;min-height:40px}
#loading{text-align:center;padding:40px;color:#706050}
</style>
</head>
<body>
<div class="container">
<h1>🎤 选择朗读音色</h1>
<p class="sub">点击下面任意一项试听，选好告诉我名字即可。</p>
<div id="status">等待选择</div>
<div id="loading">正在加载语音列表……</div>
<div id="voice-list"></div>
</div>
<script>
var synth = window.speechSynthesis;

function testVoice(voice) {
    synth.cancel();
    var utter = new SpeechSynthesisUtterance("你好，欢迎来到数士的世界。我是阿金，一条被狗神附体的小狗。希望我的故事能让你开心。");
    utter.lang = "zh-CN";
    utter.rate = 0.95;
    if (voice) utter.voice = voice;
    utter.onstart = function() { document.getElementById("status").textContent = "▶ 正在播放: " + voice.name; };
    utter.onend = function() { document.getElementById("status").textContent = "✓ 播放结束: " + voice.name; };
    utter.onerror = function() { document.getElementById("status").textContent = "✗ 播放失败: " + voice.name; };
    synth.speak(utter);
}

function renderVoices() {
    var voices = synth.getVoices();
    var container = document.getElementById("voice-list");
    var loading = document.getElementById("loading");
    if (voices.length === 0) {
        loading.textContent = "暂未检测到语音，请刷新页面";
        return;
    }
    loading.style.display = "none";

    // 中文放前面
    var sorted = Array.from(voices).sort(function(a,b) {
        var aZ = (a.lang||"").startsWith("zh") ? 0 : 1;
        var bZ = (b.lang||"").startsWith("zh") ? 0 : 1;
        return aZ - bZ;
    });

    var html = "";
    for (var i = 0; i < sorted.length; i++) {
        var v = sorted[i];
        var isZh = (v.lang || "").startsWith("zh");
        var cls = "";
        html += '<div class="voice-item" onclick="selectAndPlay(this,' + i + ')"' + cls + '>';
        html += '<span class="voice-name">' + v.name + '</span>';
        html += '<span class="voice-lang">' + v.lang + '</span>';
        html += '<span class="voice-info"> | ' + (v.localService ? '本地' : '网络') + '</span>';
        if (!isZh) html += ' <span style="color:#555;font-size:12px">(非中文)</span>';
        html += '</div>';
    }
    container.innerHTML = html;
}

function selectAndPlay(el, idx) {
    document.querySelectorAll(".voice-item").forEach(function(e) { e.classList.remove("selected"); });
    el.classList.add("selected");
    var voices = synth.getVoices();
    var actualIdx = 0;
    var items = document.querySelectorAll(".voice-item");
    for (var i = 0; i < items.length; i++) {
        if (items[i] === el) { actualIdx = i; break; }
    }
    var voice = voices[actualIdx];
    if (voice) testVoice(voice);
}

// 初始化
renderVoices();
if (synth.onvoiceschanged !== undefined) {
    synth.onvoiceschanged = renderVoices;
}
// Chrome 有时需要双重触发
setTimeout(renderVoices, 500);
</script>
</body>
</html>
